<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Arial Rounded MT Bold", "Nunito Sans", "Avenir Next", Arial, sans-serif;
      color: #1f2933;
      background: #eef2f7;
    }

    main {
      width: 100%;
      min-height: 100vh;
      background: #ffffff;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 24px;
      background: #facc15;
      color: #1f2933;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 0;
    }

    form[hidden] {
      display: none;
    }

    input,
    textarea,
    button {
      min-height: 42px;
      font: inherit;
      border-radius: 6px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #bcccdc;
      padding: 0 12px;
      color: #1f2933;
      background: #ffffff;
    }

    textarea {
      min-height: 110px;
      padding: 10px 12px;
      resize: vertical;
    }

    .task-title-input {
      font-size: 16px;
      font-weight: 700;
    }

    .task-details-input {
      min-height: 96px;
      font-size: 12px;
      font-weight: 400;
    }

    .form-label {
      color: #713f12;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input:focus,
    textarea:focus {
      outline: 3px solid rgba(250, 204, 21, 0.35);
      border-color: #ca8a04;
    }

    button {
      border: 0;
      padding: 0 18px;
      color: #1f2933;
      background: #facc15;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: #eab308;
    }

    .view-button {
      flex: 0 0 auto;
      border: 1px solid #cbd5e1;
      min-height: 26px;
      padding: 0 8px;
      background: #e2e8f0;
      color: #334155;
      font-size: 11px;
    }

    .view-button:hover {
      background: #cbd5e1;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .user-email {
      font-size: 14px;
      font-weight: 700;
    }

    .auth-button {
      min-height: 38px;
    }

    .sign-out-button {
      min-height: 26px;
      padding: 0 8px;
      background: #e2e8f0;
      color: #334155;
      font-size: 11px;
    }

    .sign-out-button:hover {
      background: #cbd5e1;
    }

    .table-wrap {
      overflow: visible;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
      table-layout: fixed;
    }

    th,
    td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 0;
      vertical-align: top;
      overflow-wrap: anywhere;
      font-size: 14px;
    }

    th {
      font-size: 11px;
      text-transform: uppercase;
      color: #713f12;
      background: #fef3c7;
      letter-spacing: 0.08em;
    }

    th:first-child,
    td:first-child {
      width: 30%;
    }

    th:nth-child(2),
    td:nth-child(2) {
      width: 17%;
    }

    th:nth-child(3),
    td:nth-child(3) {
      width: 15%;
    }

    th:nth-child(4),
    td:nth-child(4),
    th:nth-child(5),
    td:nth-child(5) {
      width: 15%;
    }

    .completed-column {
      text-align: center;
      white-space: nowrap;
      width: 8%;
    }

    .completed-controls {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    th:nth-child(3),
    th:nth-child(4),
    th:nth-child(5) {
      line-height: 1.25;
    }

    tbody td:first-child {
      border-radius: 10px 0 0 10px;
    }

    tbody td:last-child {
      border-radius: 0 10px 10px 0;
    }

    .today-row td {
      background: #fecaca;
    }

    .overdue-row td {
      background: #ef4444;
    }

    .future-row td {
      background: #bfdbfe;
    }

    .completed-row td {
      background: #bbf7d0;
    }

    .completed-checkbox {
      position: relative;
      flex: 0 0 22px;
      width: 22px;
      height: 22px;
      min-height: 22px;
      padding: 0;
      appearance: none;
      border: 2px solid #94a3b8;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
    }

    .completed-checkbox:checked {
      border-color: #43a047;
      background: #43a047;
    }

    .completed-checkbox:checked::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 45%;
      width: 5px;
      height: 9px;
      border: solid #ffffff;
      border-width: 0 2px 2px 0;
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .task-cell-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .task-name {
      min-width: 0;
      display: block;
    }

    .task-name a {
      color: #854d0e;
      font-weight: 700;
    }

    .task-primary-line {
      display: block;
      font-size: 16px;
      font-weight: 700;
      white-space: pre-wrap;
    }

    .task-secondary-line {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      font-weight: 400;
      white-space: pre-wrap;
    }

    .task-secondary-line a {
      font-weight: 400;
    }

    .edit-task-button {
      min-height: 32px;
      flex: 0 0 auto;
      padding: 0;
      font-size: 18px;
      background: transparent;
      color: #334155;
    }

    .edit-task-button:hover {
      background: transparent;
      color: #000080;
    }

    .archive-task-button {
      min-height: 18px;
      padding: 0;
      color: #334155;
      background: transparent;
      line-height: 1;
    }

    .archive-task-button:hover {
      color: #000080;
      background: transparent;
    }

    .archive-task-button svg {
      display: block;
      width: 16px;
      height: 16px;
      stroke: currentColor;
    }

    .delete-task-button {
      min-height: 18px;
      padding: 0;
      color: #334155;
      background: transparent;
      line-height: 1;
    }

    .delete-task-button:hover {
      color: #991b1b;
      background: transparent;
    }

    .delete-task-button svg {
      display: block;
      width: 16px;
      height: 16px;
      stroke: currentColor;
    }

    .add-task-button {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 20;
      width: 64px;
      height: 64px;
      min-height: 64px;
      border-radius: 50%;
      padding: 0;
      font-size: 36px;
      line-height: 1;
      background: #facc15;
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.24);
    }

    .add-task-button:hover {
      background: #eab308;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.46);
    }

    .modal-backdrop[hidden] {
      display: none;
    }

    .modal {
      width: min(420px, 100%);
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.28);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid #d9e2ec;
    }

    .modal-title {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .close-button {
      width: 36px;
      height: 36px;
      min-height: 36px;
      padding: 0;
      color: #1f2933;
      background: #eef2f7;
      border-radius: 50%;
      font-size: 22px;
      line-height: 1;
    }

    .close-button:hover {
      background: #d9e2ec;
    }

    .modal-body {
      padding: 20px;
    }

    .error-message {
      margin: 0;
      padding: 12px 24px;
      color: #991b1b;
      background: #fee2e2;
      border-bottom: 1px solid #fecaca;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      form {
        grid-template-columns: 1fr;
      }

      th,
      td {
        padding: 10px 6px;
        font-size: 12px;
      }

      th {
        font-size: 9px;
        letter-spacing: 0.04em;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>To Do List</h1>
      <div class="header-actions">
        <span class="user-email" id="user-email" hidden></span>
        <button class="auth-button" id="sign-in-button" type="button">Sign in with Google</button>
        <button class="auth-button sign-out-button" id="sign-out-button" type="button" hidden>Sign out</button>
        <button class="view-button" id="view-button" type="button" hidden>Achive</button>
        <button class="view-button" id="deleted-view-button" type="button" hidden>Deleted Items</button>
      </div>
    </header>

    <p class="error-message" id="error-message" hidden></p>

    <div class="table-wrap" id="app-content" hidden>
      <table>
        <thead>
          <tr>
            <th>Task</th>
            <th>Deadline</th>
            <th>Due</th>
            <th class="completed-only">Date Created</th>
            <th class="completed-only">Date Completed</th>
            <th class="completed-column">Completed</th>
          </tr>
        </thead>
        <tbody id="todo-body"></tbody>
      </table>
    </div>
  </main>

  <button class="add-task-button" id="add-task-button" type="button" aria-label="Add task" hidden>+</button>

  <div class="modal-backdrop" id="task-modal" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Add Task</h2>
        <button class="close-button" id="close-modal-button" type="button" aria-label="Close add task popup">&times;</button>
      </div>
      <div class="modal-body">
        <form id="todo-form">
          <label class="form-label" for="task-title-input">Title</label>
          <input class="task-title-input" id="task-title-input" type="text" placeholder="Task title" required>
          <label class="form-label" for="task-details-input">Notes</label>
          <textarea class="task-details-input" id="task-details-input" placeholder="Notes"></textarea>
          <input id="deadline-input" type="date" required>
          <button id="submit-task-button" type="submit">Add</button>
        </form>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      onAuthStateChanged,
      signInWithPopup,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      collection,
      doc,
      getFirestore,
      onSnapshot,
      setDoc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const form = document.querySelector("#todo-form");
    const taskTitleInput = document.querySelector("#task-title-input");
    const taskDetailsInput = document.querySelector("#task-details-input");
    const deadlineInput = document.querySelector("#deadline-input");
    const submitTaskButton = document.querySelector("#submit-task-button");
    const modalTitle = document.querySelector("#modal-title");
    const todoBody = document.querySelector("#todo-body");
    const completedOnlyHeaders = document.querySelectorAll(".completed-only");
    const appContent = document.querySelector("#app-content");
    const userEmail = document.querySelector("#user-email");
    const errorMessage = document.querySelector("#error-message");
    const signInButton = document.querySelector("#sign-in-button");
    const signOutButton = document.querySelector("#sign-out-button");
    const viewButton = document.querySelector("#view-button");
    const deletedViewButton = document.querySelector("#deleted-view-button");
    const addTaskButton = document.querySelector("#add-task-button");
    const taskModal = document.querySelector("#task-modal");
    const closeModalButton = document.querySelector("#close-modal-button");
    const storageKey = "todo-list-reminders";
    const firebaseConfig = {
      apiKey: "AIzaSyCWrzMD9fx8Zm8AQxehtzr7jgMJUnQAMew",
      authDomain: "reminder-24845.firebaseapp.com",
      projectId: "reminder-24845",
      storageBucket: "reminder-24845.firebasestorage.app",
      messagingSenderId: "906006048",
      appId: "1:906006048:web:4f71a58d37317af6e93645"
    };
    const firestoreIsConfigured = !firebaseConfig.apiKey.startsWith("PASTE_");
    const app = firestoreIsConfigured ? initializeApp(firebaseConfig) : null;
    const auth = firestoreIsConfigured ? getAuth(app) : null;
    const googleProvider = firestoreIsConfigured ? new GoogleAuthProvider() : null;
    const db = firestoreIsConfigured ? getFirestore(app) : null;
    const remindersCollection = firestoreIsConfigured ? collection(db, "tasks") : null;
    let currentView = "active";
    let currentUser = null;
    let editingReminderId = null;
    let remindersCache = [];
    let unsubscribeReminders = null;
    let localRemindersMigrated = false;
    const pendingReminders = new Map();
    const defaultReminders = [
      {
        id: "default-german-vocabulary-review",
        task: "Finish German vocabulary review",
        deadline: "2026-06-20",
        createdDate: "2026-06-15",
        completedDate: "",
        archived: false,
        deleted: false,
        completed: false
      },
      {
        id: "default-practice-session",
        task: "Prepare next practice session",
        deadline: "2026-06-22",
        createdDate: "2026-06-15",
        completedDate: "",
        archived: false,
        deleted: false,
        completed: false
      }
    ];

    const isDateValue = (value) => {
      return typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value);
    };

    const formatDeadline = (value) => {
      if (!isDateValue(value)) {
        return "No deadline";
      }

      const date = getDateFromValue(value);

      return date.toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    };

    const getDateFromValue = (value) => {
      if (!isDateValue(value)) {
        return null;
      }

      const [year, month, day] = value.split("-").map(Number);

      return new Date(year, month - 1, day);
    };

    const getTodayValue = () => {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    };

    const isDueToday = (deadlineValue) => deadlineValue === getTodayValue();

    const isOverdue = (deadlineValue) => {
      const deadline = getDateFromValue(deadlineValue);

      return deadline ? deadline < getDateFromValue(getTodayValue()) : false;
    };

    const getDaysRemaining = (deadlineValue) => {
      if (!isDateValue(deadlineValue)) {
        return null;
      }

      const today = getDateFromValue(getTodayValue());
      const deadline = getDateFromValue(deadlineValue);
      const millisecondsPerDay = 24 * 60 * 60 * 1000;

      return Math.round((deadline - today) / millisecondsPerDay);
    };

    const formatDaysRemaining = (deadlineValue) => {
      const days = getDaysRemaining(deadlineValue);

      if (days === null) {
        return "";
      }

      if (days === 0) {
        return "Due today";
      }

      if (days === -1) {
        return "Due 1 day ago";
      }

      if (days < -1) {
        return `Due ${Math.abs(days)} days ago`;
      }

      if (days === 1) {
        return "Due tomorrow";
      }

      return `Due in ${days} days`;
    };

    const createReminderId = () => {
      if (window.crypto && window.crypto.randomUUID) {
        return window.crypto.randomUUID();
      }

      return `${Date.now()}-${Math.random()}`;
    };

    const normalizeReminders = (reminders) => {
      return reminders.map((reminder) => ({
        id: reminder.id || createReminderId(),
        task: reminder.task || "Untitled task",
        deadline: isDateValue(reminder.deadline) ? reminder.deadline : "",
        createdDate: isDateValue(reminder.createdDate) ? reminder.createdDate : getTodayValue(),
        completedDate: reminder.completed ? isDateValue(reminder.completedDate) ? reminder.completedDate : getTodayValue() : "",
        ownerEmail: reminder.ownerEmail || "",
        ownerUid: reminder.ownerUid || "",
        archived: Boolean(reminder.archived),
        deleted: Boolean(reminder.deleted),
        completed: Boolean(reminder.completed)
      }));
    };

    const showError = (message) => {
      errorMessage.textContent = message;
      errorMessage.hidden = false;
    };

    const clearError = () => {
      errorMessage.textContent = "";
      errorMessage.hidden = true;
    };

    const splitTaskText = (task) => {
      const lines = task.split("\n");

      return {
        title: lines[0] || "",
        details: lines.slice(1).join("\n")
      };
    };

    const getTaskTextFromInputs = () => {
      const title = taskTitleInput.value.trim();
      const details = taskDetailsInput.value.trim();

      if (!details) {
        return title;
      }

      return `${title}\n${details}`;
    };

    const openAddModal = () => {
      editingReminderId = null;
      modalTitle.textContent = "Add Task";
      submitTaskButton.textContent = "Add";
      form.reset();
      taskModal.hidden = false;
      taskTitleInput.focus();
    };

    const openEditModal = (reminder) => {
      const taskParts = splitTaskText(reminder.task);

      editingReminderId = reminder.id;
      modalTitle.textContent = "Edit Task";
      submitTaskButton.textContent = "Save";
      taskTitleInput.value = taskParts.title;
      taskDetailsInput.value = taskParts.details;
      deadlineInput.value = reminder.deadline;
      taskModal.hidden = false;
      taskTitleInput.focus();
    };

    const closeTaskModal = () => {
      editingReminderId = null;
      taskModal.hidden = true;
      form.reset();
      modalTitle.textContent = "Add Task";
      submitTaskButton.textContent = "Add";
    };

    const getLocalReminders = () => {
      const savedReminders = localStorage.getItem(storageKey);

      if (savedReminders) {
        const reminders = normalizeReminders(JSON.parse(savedReminders));
        saveLocalReminders(reminders);

        return reminders;
      }

      return normalizeReminders(defaultReminders);
    };

    const getSavedLocalReminders = () => {
      const savedReminders = localStorage.getItem(storageKey);

      if (!savedReminders) {
        return [];
      }

      const reminders = normalizeReminders(JSON.parse(savedReminders));
      saveLocalReminders(reminders);

      return reminders;
    };

    const saveLocalReminders = (reminders) => {
      localStorage.setItem(storageKey, JSON.stringify(reminders));
    };

    const migrateLocalRemindersToFirestore = async () => {
      if (localRemindersMigrated || !firestoreIsConfigured) {
        return;
      }

      localRemindersMigrated = true;

      const savedLocalReminders = getSavedLocalReminders();

      await Promise.all(savedLocalReminders.map((reminder) => {
        pendingReminders.set(reminder.id, reminder);

        return setDoc(doc(db, "tasks", reminder.id), reminder);
      }));
    };

    const updateReminderCompletion = async (reminderId, completed) => {
      const completedDate = completed ? getTodayValue() : "";

      if (firestoreIsConfigured) {
        await updateDoc(doc(db, "tasks", reminderId), {
          completed,
          completedDate
        });

        return;
      }

      remindersCache = remindersCache.map((reminder) => {
        if (reminder.id === reminderId) {
          return {
            ...reminder,
            completed,
            completedDate
          };
        }

        return reminder;
      });

      saveLocalReminders(remindersCache);
      renderReminders();
    };

    const archiveReminder = async (reminderId) => {
      remindersCache = remindersCache.map((reminder) => {
        if (reminder.id === reminderId) {
          return {
            ...reminder,
            archived: true
          };
        }

        return reminder;
      });

      const archivedReminder = remindersCache.find((reminder) => reminder.id === reminderId);

      if (archivedReminder) {
        pendingReminders.set(reminderId, archivedReminder);
      }

      renderReminders();

      if (firestoreIsConfigured) {
        try {
          await updateDoc(doc(db, "tasks", reminderId), {
            archived: true
          });
        } catch (error) {
          saveLocalReminders(remindersCache);
          showError(`Task was archived here, but Firestore did not save the archive: ${error.message}`);
        }
      } else {
        saveLocalReminders(remindersCache);
      }
    };

    const deleteReminder = async (reminderId) => {
      remindersCache = remindersCache.map((reminder) => {
        if (reminder.id === reminderId) {
          return {
            ...reminder,
            deleted: true
          };
        }

        return reminder;
      });

      const deletedReminder = remindersCache.find((reminder) => reminder.id === reminderId);

      if (deletedReminder) {
        pendingReminders.set(reminderId, deletedReminder);
      }

      renderReminders();

      if (firestoreIsConfigured) {
        try {
          await updateDoc(doc(db, "tasks", reminderId), {
            deleted: true
          });
        } catch (error) {
          saveLocalReminders(remindersCache);
          showError(`Task was deleted here, but Firestore did not save the delete: ${error.message}`);
        }
      } else {
        saveLocalReminders(remindersCache);
      }
    };

    const updateReminderDetails = async (reminderId, details) => {
      remindersCache = remindersCache.map((reminder) => {
        if (reminder.id === reminderId) {
          return {
            ...reminder,
            ...details
          };
        }

        return reminder;
      });
      const updatedReminder = remindersCache.find((reminder) => reminder.id === reminderId);

      if (updatedReminder) {
        pendingReminders.set(reminderId, updatedReminder);
      }

      renderReminders();

      if (firestoreIsConfigured) {
        try {
          await updateDoc(doc(db, "tasks", reminderId), details);
        } catch (error) {
          saveLocalReminders(remindersCache);
          showError(`Task was updated here, but Firestore did not save the edit: ${error.message}`);
        }
      } else {
        saveLocalReminders(remindersCache);
      }
    };

    const appendLinkedText = (element, text) => {
      const linkPattern = /(https?:\/\/[^\s]+|file:\/\/[^\s]+|www\.[^\s]+)/g;
      let lastIndex = 0;

      text.replace(linkPattern, (match, url, offset) => {
        element.append(document.createTextNode(text.slice(lastIndex, offset)));

        const link = document.createElement("a");
        const trailingPunctuation = match.match(/[.,;:!?)]$/)?.[0] || "";
        const linkText = trailingPunctuation ? match.slice(0, -1) : match;
        const isFileLink = linkText.startsWith("file://");
        const href = linkText.startsWith("http") || isFileLink ? linkText : `https://${linkText}`;

        link.href = href;
        link.textContent = linkText;
        link.target = "_blank";
        link.rel = "noopener noreferrer";

        if (isFileLink && window.location.protocol !== "file:") {
          link.addEventListener("click", async (event) => {
            event.preventDefault();

            try {
              await navigator.clipboard.writeText(linkText);
              showError("Browsers block file links from websites. I copied the file link instead.");
            } catch (error) {
              showError("Browsers block file links from websites. Copy the file link and open it from Finder or a local browser window.");
            }
          });
        }

        element.append(link);
        element.append(document.createTextNode(trailingPunctuation));

        lastIndex = offset + match.length;
      });

      element.append(document.createTextNode(text.slice(lastIndex)));
    };

    const appendTaskText = (element, text) => {
      const lines = text.split("\n");
      const primaryLine = document.createElement("span");

      primaryLine.className = "task-primary-line";
      appendLinkedText(primaryLine, lines[0] || "");
      element.append(primaryLine);

      lines.slice(1).forEach((line) => {
        const secondaryLine = document.createElement("span");

        secondaryLine.className = "task-secondary-line";
        appendLinkedText(secondaryLine, line);
        element.append(secondaryLine);
      });
    };

    const addReminderRow = (reminder) => {
      const row = document.createElement("tr");
      const taskCell = document.createElement("td");
      const taskCellContent = document.createElement("div");
      const taskName = document.createElement("span");
      const editButton = document.createElement("button");
      const deadlineCell = document.createElement("td");
      const daysRemainingCell = document.createElement("td");
      const completedCell = document.createElement("td");
      const completedCheckbox = document.createElement("input");
      const completedControls = document.createElement("div");
      const archiveButton = document.createElement("button");
      const deleteButton = document.createElement("button");

      taskName.className = "task-name";
      appendTaskText(taskName, reminder.task);
      editButton.type = "button";
      editButton.className = "edit-task-button";
      editButton.textContent = "✎";
      editButton.setAttribute("aria-label", `Edit ${reminder.task}`);
      editButton.title = "Edit task";
      editButton.addEventListener("click", () => {
        openEditModal(reminder);
      });
      taskCellContent.className = "task-cell-content";
      taskCellContent.append(taskName, editButton);
      taskCell.append(taskCellContent);
      deadlineCell.textContent = formatDeadline(reminder.deadline);
      daysRemainingCell.textContent = reminder.completed ? "Completed" : formatDaysRemaining(reminder.deadline);
      completedCheckbox.type = "checkbox";
      completedCheckbox.className = "completed-checkbox";
      completedCheckbox.checked = reminder.completed;
      completedCheckbox.setAttribute("aria-label", `Mark ${reminder.task} completed`);
      completedCheckbox.addEventListener("change", () => {
        updateReminderCompletion(reminder.id, completedCheckbox.checked);
      });
      archiveButton.type = "button";
      archiveButton.className = "archive-task-button";
      archiveButton.innerHTML = `
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 8h14" />
          <path d="M6 8v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8" />
          <path d="M4 8V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2" />
          <path d="M10 12h4" />
        </svg>
      `;
      archiveButton.setAttribute("aria-label", `Archive ${reminder.task}`);
      archiveButton.title = "Archive task";
      archiveButton.addEventListener("click", () => {
        archiveReminder(reminder.id);
      });
      deleteButton.type = "button";
      deleteButton.className = "delete-task-button";
      deleteButton.innerHTML = `
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 7h16" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M6 7l1 14h10l1-14" />
          <path d="M9 7V4h6v3" />
        </svg>
      `;
      deleteButton.setAttribute("aria-label", `Delete ${reminder.task}`);
      deleteButton.title = "Delete task";
      deleteButton.addEventListener("click", () => {
        deleteReminder(reminder.id);
      });
      completedControls.className = "completed-controls";
      completedControls.append(completedCheckbox, archiveButton, deleteButton);
      completedCell.className = "completed-column";
      completedCell.append(completedControls);

      if (isDueToday(reminder.deadline)) {
        row.classList.add("today-row");
      }

      if (isOverdue(reminder.deadline)) {
        row.classList.add("overdue-row");
      }

      if (getDaysRemaining(reminder.deadline) > 0) {
        row.classList.add("future-row");
      }

      if (reminder.completed) {
        row.classList.add("completed-row");
      }

      row.dataset.deadline = reminder.deadline;
      row.append(taskCell, deadlineCell, daysRemainingCell);

      if (currentView !== "active") {
        const createdDateCell = document.createElement("td");
        const completedDateCell = document.createElement("td");

        createdDateCell.textContent = formatDeadline(reminder.createdDate);
        createdDateCell.className = "completed-only";
        completedDateCell.textContent = reminder.completedDate ? formatDeadline(reminder.completedDate) : "";
        completedDateCell.className = "completed-only";
        row.append(createdDateCell, completedDateCell);
      }

      row.append(completedCell);
      todoBody.append(row);
    };

    const sortReminders = (reminders) => {
      return [...reminders].sort((first, second) => {
        if (first.completed && !second.completed) {
          return 1;
        }

        if (!first.completed && second.completed) {
          return -1;
        }

        if (isOverdue(first.deadline) && !isOverdue(second.deadline)) {
          return -1;
        }

        if (!isOverdue(first.deadline) && isOverdue(second.deadline)) {
          return 1;
        }

        if (isDueToday(first.deadline) && !isDueToday(second.deadline)) {
          return -1;
        }

        if (!isDueToday(first.deadline) && isDueToday(second.deadline)) {
          return 1;
        }

        const firstCreatedDate = getDateFromValue(first.createdDate);
        const secondCreatedDate = getDateFromValue(second.createdDate);

        if (first.completed && second.completed) {
          const firstCompletedDate = getDateFromValue(first.completedDate);
          const secondCompletedDate = getDateFromValue(second.completedDate);

          if (firstCompletedDate && secondCompletedDate && firstCompletedDate - secondCompletedDate !== 0) {
            return secondCompletedDate - firstCompletedDate;
          }
        }

        if (firstCreatedDate && secondCreatedDate && firstCreatedDate - secondCreatedDate !== 0) {
          return secondCreatedDate - firstCreatedDate;
        }

        const firstDate = getDateFromValue(first.deadline);
        const secondDate = getDateFromValue(second.deadline);

        if (!firstDate && !secondDate) {
          return 0;
        }

        if (!firstDate) {
          return 1;
        }

        if (!secondDate) {
          return -1;
        }

        return firstDate - secondDate;
      });
    };

    const renderReminders = () => {
      const canUseApp = !firestoreIsConfigured || Boolean(currentUser);

      appContent.hidden = !canUseApp;
      viewButton.hidden = !canUseApp;
      deletedViewButton.hidden = !canUseApp;
      addTaskButton.hidden = !canUseApp || currentView !== "active";
      errorMessage.hidden = !errorMessage.textContent;

      if (!canUseApp) {
        todoBody.innerHTML = "";
        taskModal.hidden = true;
        return;
      }

      const visibleReminders = remindersCache.filter((reminder) => {
        if (currentView === "archive") {
          return reminder.archived && !reminder.deleted;
        }

        if (currentView === "deleted") {
          return reminder.deleted;
        }

        return !reminder.archived && !reminder.deleted;
      });

      todoBody.innerHTML = "";
      sortReminders(visibleReminders).forEach(addReminderRow);
      viewButton.textContent = currentView === "archive" ? "To Do List" : "Achive";
      deletedViewButton.textContent = currentView === "deleted" ? "To Do List" : "Deleted Items";
      completedOnlyHeaders.forEach((header) => {
        header.hidden = currentView === "active";
      });
      document.querySelectorAll("td.completed-only").forEach((cell) => {
        cell.hidden = currentView === "active";
      });
      taskModal.hidden = currentView !== "active" || taskModal.hidden;
    };

    const stopReminderSubscription = () => {
      if (unsubscribeReminders) {
        unsubscribeReminders();
        unsubscribeReminders = null;
      }
    };

    const startReminderSubscription = () => {
      stopReminderSubscription();
      unsubscribeReminders = onSnapshot(remindersCollection, async (snapshot) => {
        if (snapshot.empty) {
          await migrateLocalRemindersToFirestore();
          remindersCache = Array.from(pendingReminders.values());
          renderReminders();
          return;
        }

        const firestoreReminders = normalizeReminders(snapshot.docs.map((taskDoc) => ({
          id: taskDoc.id,
          ...taskDoc.data()
        })));

        firestoreReminders.forEach((reminder) => {
          pendingReminders.delete(reminder.id);
        });

        remindersCache = [
          ...firestoreReminders,
          ...Array.from(pendingReminders.values())
        ];
        renderReminders();
      }, (error) => {
        console.error("Could not load Firestore tasks:", error);
      });
    };

    const updateAuthUi = (user) => {
      currentUser = user;
      userEmail.textContent = user ? user.email : "";
      userEmail.hidden = !user;
      signInButton.hidden = Boolean(user) || !firestoreIsConfigured;
      signOutButton.hidden = !user || !firestoreIsConfigured;
    };

    viewButton.addEventListener("click", () => {
      currentView = currentView === "archive" ? "active" : "archive";
      taskModal.hidden = true;
      renderReminders();
    });

    deletedViewButton.addEventListener("click", () => {
      currentView = currentView === "deleted" ? "active" : "deleted";
      taskModal.hidden = true;
      renderReminders();
    });

    signInButton.addEventListener("click", async () => {
      try {
        clearError();
        await signInWithPopup(auth, googleProvider);
      } catch (error) {
        showError(`Sign in failed: ${error.message}`);
      }
    });

    signOutButton.addEventListener("click", async () => {
      try {
        clearError();
        await signOut(auth);
      } catch (error) {
        showError(`Sign out failed: ${error.message}`);
      }
    });

    addTaskButton.addEventListener("click", () => {
      openAddModal();
    });

    closeModalButton.addEventListener("click", () => {
      closeTaskModal();
    });

    taskModal.addEventListener("click", (event) => {
      if (event.target === taskModal) {
        closeTaskModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !taskModal.hidden) {
        closeTaskModal();
      }
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearError();

      if (editingReminderId) {
        await updateReminderDetails(editingReminderId, {
          task: getTaskTextFromInputs(),
          deadline: deadlineInput.value
        });
        closeTaskModal();
        return;
      }

      const reminder = {
        id: createReminderId(),
        task: getTaskTextFromInputs(),
        deadline: deadlineInput.value,
        createdDate: getTodayValue(),
        completedDate: "",
        ownerEmail: currentUser ? currentUser.email : "",
        ownerUid: currentUser ? currentUser.uid : "",
        archived: false,
        deleted: false,
        completed: false
      };

      remindersCache.push(reminder);
      pendingReminders.set(reminder.id, reminder);
      closeTaskModal();
      renderReminders();

      if (firestoreIsConfigured) {
        try {
          await setDoc(doc(db, "tasks", reminder.id), reminder);
        } catch (error) {
          saveLocalReminders(remindersCache);
          renderReminders();
          showError(`Task is shown here, but Firestore did not save it: ${error.message}`);
        }
      } else {
        saveLocalReminders(remindersCache);
      }
    });

    if (firestoreIsConfigured) {
      onAuthStateChanged(auth, (user) => {
        updateAuthUi(user);

        if (user) {
          startReminderSubscription();
        } else {
          stopReminderSubscription();
          pendingReminders.clear();
          remindersCache = [];
          currentView = "active";
          taskModal.hidden = true;
        }

        renderReminders();
      });
    } else {
      updateAuthUi(null);
      remindersCache = getLocalReminders();
      renderReminders();
    }
  </script>
</body>
</html>
